- name: AI Professional Twin
  slug: ai-professional-twin
  description: >
    A RAG-powered AI assistant that serves as a digital professional identity for
    Vishal. Ingests his resume, skills, projects, and career Q&A into a vector
    store and answers recruiter/interviewer questions through a streaming chat
    interface. Built as a full-stack project with a FastAPI backend, ChromaDB
    for retrieval, and a React frontend.
  tech_stack: [Python, FastAPI, ChromaDB, React, TypeScript, Docker, uv]
  github_url: https://github.com/DataScienceVishal/my-ai-resume
  category: AI/LLM
  highlights:
    - Retrieval-augmented generation pipeline over structured career knowledge
    - FastAPI backend with health checks and streaming chat endpoints
    - Dockerized, reproducible build using uv for dependency management
    - Designed to answer recruiter-style questions with grounded, factual answers

