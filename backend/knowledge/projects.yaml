# Projects from Vishal Khan's resume and GitHub (github.com/DataScienceVishal)

- name: AI Digital Twin & Interactive Responsive Portfolio
  slug: ai-digital-twin
  description: >
    Architected an always-on digital twin assistant to provide recruiters with
    fluid, context-aware access to professional background data. Developed a
    vanilla HTML5/CSS3/JS web app utilizing dynamic viewport height (dvh) for
    mobile responsiveness; engineered a direct serverless gateway to OpenAI GPT
    models featuring context-window prompt optimization and token streaming.
    Deployed to Vercel CDN, implementing layout-adaptive rendering and
    interactive inquiry chips that cut cold-start latency and increased mobile
    engagement.
  tech_stack: [HTML5, CSS3, JavaScript, OpenAI GPT, Vercel]
  github_url: https://github.com/DataScienceVishal/my-ai-resume
  category: Generative AI
  highlights:
    - Always-on digital twin assistant for recruiter engagement
    - Serverless gateway to OpenAI GPT models with token streaming
    - Layout-adaptive rendering with dvh for mobile responsiveness
    - Deployed on Vercel CDN with interactive inquiry chips

- name: Image Classification with CNN (CIFAR-10)
  slug: image-classification-cnn-cifar10
  description: >
    Developed a Convolutional Neural Network model for image classification on
    the CIFAR-10 dataset. Designed a CNN in TensorFlow/Keras with normalization,
    dropout, and L2 regularization to enhance accuracy and generalization.
    Achieved a training accuracy of 72.12% and a validation accuracy of 74.06%.
  tech_stack: [Python, TensorFlow, Keras]
  github_url: https://github.com/DataScienceVishal
  category: Deep Learning
  highlights:
    - CNN architecture with normalization, dropout, and L2 regularization
    - 72.12% training accuracy and 74.06% validation accuracy
    - Focus on generalization through regularization techniques

- name: Telecom Churn Prediction
  slug: telecom-churn-prediction
  description: >
    Predicted customer churn from 21 predictor variables and identified the
    strongest retention levers. Ran EDA, preprocessing, and feature engineering
    in Python/SQL, then benchmarked classification models including Logistic
    Regression. Achieved ~80% accuracy and identified tenure as the strongest
    churn predictor.
  tech_stack: [Python, Pandas, Scikit-learn, SQL]
  github_url: https://github.com/DataScienceVishal
  category: Machine Learning
  highlights:
    - Full EDA, preprocessing, and feature engineering pipeline
    - ~80% accuracy using Logistic Regression
    - Identified customer tenure as the strongest churn predictor

- name: Reinforcement Learning for Dynamic Pricing in E-commerce
  slug: rl-dynamic-pricing
  description: >
    MSc thesis testing whether RL can outperform pricing rules in a simulated
    e-commerce environment. Built a custom Gym-style environment on real
    e-commerce data, then trained DQN, A2C, and PPO agents over multi-episode
    simulations. DQN produced the most stable profit curve. Wrote up the
    comparative analysis as part of the dissertation at LJMU, 2024.
  tech_stack: [Python, Reinforcement Learning, OpenAI Gym, DQN, A2C, PPO]
  github_url: ""
  category: Research
  highlights:
    - Custom Gym-style environment on real e-commerce data
    - Compared DQN, A2C, and PPO agents for dynamic pricing
    - DQN produced the most stable profit curve
    - MSc dissertation at LJMU (2024)
