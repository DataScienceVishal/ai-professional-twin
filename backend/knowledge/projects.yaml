# Projects from Vishal Khan's resume and GitHub (github.com/DataScienceVishal)

- name: AI Professional Twin V2 - Full-Stack RAG Application
  slug: ai-professional-twin-v2
  description: >
    Built a production RAG (Retrieval-Augmented Generation) system as an
    interactive AI twin for recruiter engagement. The backend uses FastAPI with
    ChromaDB as a vector store, text-embedding-3-small for embeddings, and
    gpt-4.1-mini for generation via GitHub Models (free tier). Documents from
    YAML knowledge files, a resume PDF, and live GitHub repos are chunked,
    embedded, and stored in ChromaDB on startup. The retriever performs cosine
    similarity search to find relevant context, which is injected into the
    system prompt alongside mode-specific instructions (General, Recruiter,
    Interview). Responses stream via SSE. The React + Vite + Tailwind frontend
    renders markdown with syntax highlighting and Mermaid diagrams, shows
    clickable source citations with real URLs, and provides suggestion chips
    that shuffle after each message. Deployed on Railway (backend) and Vercel
    (frontend), both free tier.
  tech_stack: [Python, FastAPI, ChromaDB, React, Vite, Tailwind CSS, GitHub Models, RAG, LangChain concepts, Docker]
  github_url: https://github.com/DataScienceVishal/ai-professional-twin
  category: Generative AI
  highlights:
    - Full RAG pipeline with chunking, embedding, retrieval, and generation
    - ChromaDB vector store with cosine similarity search
    - SSE streaming responses from FastAPI to React frontend
    - Live GitHub repo and README ingestion on startup
    - Three chat modes (General, Recruiter, Interview) with tailored prompts
    - Deployed on Railway + Vercel free tier

