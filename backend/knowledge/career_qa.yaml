# Pre-written Q&A pairs for recruiter and interviewer questions about Vishal Khan

- topic: hiring
  question: Why should we hire Vishal?
  answer: >
    Vishal brings around 2 years of hands-on data engineering at Teleperformance
    where he built Databricks pipelines processing millions of telecom records
    and migrated on-prem SQL Server schemas, improving query performance by ~20%
    and cutting costs by ~20%. Before that, he spent 2+ years translating
    commercial requirements into analytics and ML forecasting models (80-90%
    accuracy). He holds an MSc in Data Science from LJMU and is currently
    deepening his expertise with an MSc in AI and Computer Science at
    Northeastern University London. His MSc thesis compared Reinforcement
    Learning algorithms (DQN, A2C, PPO) for dynamic pricing in e-commerce.

- topic: career-goals
  question: What are Vishal's career goals?
  answer: >
