    learning engineering. His trajectory shows a clear pattern: starting in
    finance and taxation, moving into commercial analytics with Python-based
    reporting and ML forecasting, then into data engineering with Databricks
    and cloud pipelines, and now pursuing an MSc in AI and Computer Science
    with a focus on Generative AI (LLMs, RAG, Prompt Engineering). His goal
    is to work on production AI systems where he can combine his data
    engineering background with his deep learning and GenAI expertise.

- topic: technical-strengths
  question: What are Vishal's technical strengths?
  answer: >
    Vishal's core strengths span data engineering and applied ML/AI. He is
    proficient in Python, SQL, and R with hands-on experience in Databricks,
    Azure, AWS, MySQL, SQL Server, MongoDB, and Neo4js. In ML he has worked
    with Reinforcement Learning (DQN, A2C, PPO), Deep Learning, Classification,
    Regression, Time-Series Forecasting, and NLP using PyTorch, TensorFlow,
    Keras, and Scikit-learn. He also has Generative AI skills including LLMs,
    RAG, Prompt Engineering, LangChain, FAISS, and Gemini API. He is skilled
